version: "1.0"
type: conditional.if
name: Check Success Status
parameters:
  condition: true
  then:
    version: "1.0"
    type: http
    name: Success Handler
    parameters:
      method: GET
      url: https://httpbin.org/status/200
  else:
    version: "1.0"
    type: http
    name: Error Handler
    parameters:
      method: GET
      url: https://httpbin.org/status/500
