version: "1.0"
type: group.sequence
name: Multi-Step Workflow
nodes:
  - version: "1.0"
    type: http
    name: Fetch Data
    parameters:
      method: GET
      url: https://api.github.com/users/octocat

  - version: "1.0"
    type: transform.jq
    name: Extract Name
    parameters:
      query: ".name"

  - version: "1.0"
    type: http
    name: Log Result
    parameters:
      method: POST
      url: https://httpbin.org/post
      body: "{{previous}}"
