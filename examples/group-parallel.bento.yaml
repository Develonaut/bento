# Parallel execution example
type: group.parallel
name: Concurrent API Calls
parameters:
  nodes:
    - type: http
      name: Fetch User
      parameters:
        method: GET
        url: https://api.github.com/users/octocat

    - type: http
      name: Fetch Repos
      parameters:
        method: GET
        url: https://api.github.com/users/octocat/repos

    - type: http
      name: Fetch Followers
      parameters:
        method: GET
        url: https://api.github.com/users/octocat/followers
