version: "1.0"
type: group.sequence
name: API Pipeline
parameters:
    nodes:
        - name: Fetch User
          parameters:
            method: GET
            url: https://api.github.com/users/octocat
          type: http
        - name: Extract Login
          parameters:
            query: .login
          type: transform.jq
        - name: Fetch Repos
          parameters:
            method: GET
            url: https://api.github.com/users/octocat/repos
          type: http
