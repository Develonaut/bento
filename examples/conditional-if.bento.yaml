version: "1.0"
type: conditional.if
name: Environment-Based Deployment
parameters:
    condition: true
    else:
        name: Deploy to Staging
        parameters:
            method: POST
            url: https://api.example.com/deploy/staging
        type: http
    then:
        name: Deploy to Production
        parameters:
            method: POST
            url: https://api.example.com/deploy/production
        type: http
