# Conditional execution example
type: conditional.if
name: Environment-Based Deployment
parameters:
  condition: true  # In real use, this would be dynamic
  then:
    type: http
    name: Deploy to Production
    parameters:
      method: POST
      url: https://api.example.com/deploy/production
  else:
    type: http
    name: Deploy to Staging
    parameters:
      method: POST
      url: https://api.example.com/deploy/staging
